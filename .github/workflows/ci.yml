name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  prek:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Run prek
        uses: j178/prek-action@v2

      - name: Run tests
        run: uv run --no-project --with pytest python -m pytest scripts/test_git_line_rank.py
