default_install_hook_types: [pre-commit, commit-msg]

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.15
    hooks:
      - id: ruff-check
        args: [--fix]
        types_or: [python, jupyter]
      - id: ruff-format
        types_or: [python, jupyter]

  - repo: local
    hooks:
      - id: ty
        name: ty check
        entry: ty check --ignore unused-ignore-comment
        language: python
        types: [python]
        pass_filenames: false
        additional_dependencies: [ty, pillow, requests]

  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1
    hooks:
      - id: shellcheck
        # docs: https://github.com/koalaman/shellcheck/wiki
        # -x/--external-sources: Allow 'source' outside of FILES
        args: [-x, --shell=bash]
        # shellcheck has no zsh support, so skip zsh files (e.g. .zshrc)
        exclude_types: [zsh]

  - repo: builtin
    hooks:
      - id: check-case-conflict
      - id: check-symlinks
      - id: check-yaml
      - id: destroyed-symlinks
      - id: end-of-file-fixer
      - id: forbid-new-submodules
      - id: mixed-line-ending
      - id: trailing-whitespace

  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.48.0
    hooks:
      - id: markdownlint
        # MD013: line too long
        # MD033: no inline HTML
        # MD041: first line in a file should be a top-level heading
        args: [--disable, MD013, MD033, MD041, '--']

  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.2
    hooks:
      - id: codespell
        stages: [pre-commit, commit-msg]
        args: [--check-filenames, --ignore-words-list=atomate]

  - repo: https://github.com/crate-ci/typos
    rev: v1.47.0
    hooks:
      - id: typos
        types: [text]
        args: []
